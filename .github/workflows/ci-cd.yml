name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/cricket-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/cricket-frontend

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Build & Push Docker Images
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 2 — Deploy via Docker Compose on Server
  # (runs only on push to main, after build succeeds)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Pull latest images
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest

            # Go to project folder on server (create if first time)
            mkdir -p ~/cricket-application
            cd ~/cricket-application

            # Write the .env file from GitHub secret
            echo "${{ secrets.BACKEND_ENV }}" > ./backend.env

            # Write docker-compose.yml (inline from repo)
            cat > docker-compose.yml << 'EOF'
            services:
              backend:
                image: ${{ env.BACKEND_IMAGE }}:latest
                env_file: ./backend.env
                ports:
                  - "5000:5000"
                depends_on:
                  mongo:
                    condition: service_healthy
                restart: unless-stopped

              frontend:
                image: ${{ env.FRONTEND_IMAGE }}:latest
                ports:
                  - "80:80"
                depends_on:
                  - backend
                restart: unless-stopped

              mongo:
                image: mongo:latest
                ports:
                  - "27017:27017"
                volumes:
                  - mongo_data:/data/db
                restart: unless-stopped
                healthcheck:
                  test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

            volumes:
              mongo_data:
            EOF

            # Restart stack
            docker compose down
            docker compose up -d
            docker compose ps
